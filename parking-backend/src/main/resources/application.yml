server:
  port: 8088

spring:
  application:
    name: smart-parking
  datasource:
    url: jdbc:mysql://localhost:3306/smart_parking?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ab123168
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: never
      schema-locations: classpath:sql/init.sql
      data-locations: classpath:sql/data.sql

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

parking:
  jwt:
    secret: SmartParkingSystemSecretKey2024ForJWTTokenGeneration
    expiration: 86400000  # 24 hours
    header: Authorization
    prefix: "Bearer "
